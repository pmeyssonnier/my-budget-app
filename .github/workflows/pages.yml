name: Déploiement GitHub Pages

# Publie l'application (fichier statique unique) sur GitHub Pages à chaque
# push sur main. Le job active Pages automatiquement au premier passage
# (enablement: true), donc aucun réglage manuel n'est nécessaire.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule les déploiements en cours périmés.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Configuration de Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empaquetage du site (racine du dépôt)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
