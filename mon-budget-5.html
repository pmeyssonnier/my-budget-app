<!DOCTYPE html>

<title>Mon Budget — Suivi mensuel & annuel</title>
<!-- ============================================================
     MON BUDGET — Application single-file de gestion de budget
     Inspirée de focus.daily, mais 100% autonome et privée.
     Stack : HTML + CSS + JavaScript vanilla (aucune dépendance réseau
     sauf SheetJS chargé depuis CDN pour lire les fichiers .xlsx).
     Persistance : localStorage + export/import JSON.
     Auteur : généré pour Pierre — commentaires en français.
     ============================================================ -->
<style>
/* ---------- Thème & variables ---------- */
/* Thème SOMBRE (par défaut) */
:root{
  --bg:#0f1419;            /* fond principal très sombre bleu-nuit */
  --bg-2:#161d26;         /* cartes */
  --bg-3:#1e2733;         /* éléments interactifs */
  --line:#2a3644;         /* bordures discrètes */
  --txt:#e6edf3;          /* texte principal */
  --txt-2:#8b98a5;        /* texte secondaire */
  --or:#e0b64a;           /* accent doré/ambre (signature) */
  --or-soft:#c9a03e;
  --or-contrast:#1a1205;  /* texte sur fond doré */
  --vert:#4ea87a;         /* revenus / positif */
  --rouge:#d96b6b;        /* dépenses / négatif */
  --bleu:#5b8fc7;         /* épargne */
  --violet:#9878c4;       /* crédits */
  --header-bg:rgba(15,20,25,.92);
  --radius:14px;
  --shadow:0 4px 24px rgba(0,0,0,.35);
}
/* Thème CLAIR */
:root[data-theme="light"]{
  --bg:#f4f2ec;            /* crème doux */
  --bg-2:#ffffff;          /* cartes blanches */
  --bg-3:#f0ede4;          /* éléments interactifs */
  --line:#e0dccf;          /* bordures discrètes */
  --txt:#2a2620;           /* texte principal brun-noir */
  --txt-2:#8a8377;         /* texte secondaire */
  --or:#b8862a;            /* doré foncé, lisible sur blanc */
  --or-soft:#a5771f;
  --or-contrast:#ffffff;   /* texte sur fond doré */
  --vert:#3d8a63;
  --rouge:#c25151;
  --bleu:#4a7db5;
  --violet:#8560b0;
  --header-bg:rgba(244,242,236,.92);
  --shadow:0 4px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--txt);line-height:1.5;
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}
h1,h2,h3{font-weight:700;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer}
a{color:var(--or)}

/* ---------- En-tête ---------- */
header{
  background:var(--header-bg);
  border-bottom:1px solid var(--line);
  padding:14px 20px;
}
.header-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;max-width:1400px;margin:0 auto}
.logo{font-size:1.35rem;font-weight:800;letter-spacing:-.03em}
.logo .accent{color:var(--or)}
.header-sub{color:var(--txt-2);font-size:.82rem}
.header-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}

/* ---------- Boutons ---------- */
.btn{
  background:var(--bg-3);color:var(--txt);border:1px solid var(--line);
  padding:9px 15px;border-radius:10px;font-size:.85rem;font-weight:600;
  display:inline-flex;align-items:center;gap:7px;transition:.15s;
}
.btn:hover{border-color:var(--or);color:var(--or)}
.btn-primary{background:var(--or);color:var(--or-contrast);border-color:var(--or)}
.btn-primary:hover{background:var(--or-soft);color:var(--or-contrast)}
.btn-danger:hover{border-color:var(--rouge);color:var(--rouge)}
.btn-sm{padding:5px 10px;font-size:.78rem}

/* ---------- Navigation onglets ---------- */
nav.tabs{
  position:sticky;top:0;z-index:40;
  background:var(--bg-2);
  padding:0 12px;
  display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid var(--line);
  -webkit-overflow-scrolling:touch;scrollbar-width:thin;
}
nav.tabs::-webkit-scrollbar{height:4px}
nav.tabs::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.tab{
  background:none;border:none;color:var(--txt-2);
  padding:13px 14px;font-size:.86rem;font-weight:600;white-space:nowrap;
  border-bottom:2px solid transparent;transition:.15s;
}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--or);border-bottom-color:var(--or)}

/* ---------- Conteneur principal ---------- */
main{max-width:1400px;margin:0 auto;padding:24px 20px 80px}
.view{display:none;animation:fade .3s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Cartes KPI ---------- */
.kpi-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;margin-bottom:24px;
}
.kpi{
  background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 20px;position:relative;overflow:hidden;
}
.kpi::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--or)}
.kpi.revenus::before{background:var(--vert)}
.kpi.depenses::before{background:var(--rouge)}
.kpi.frais::before{background:var(--or)}
.kpi.credits::before{background:var(--violet)}
.kpi.epargne::before{background:var(--bleu)}
.kpi.reste::before{background:linear-gradient(90deg,var(--vert),var(--or))}
.kpi-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-2);font-weight:700}
.kpi-value{font-size:1.7rem;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:.75rem;color:var(--txt-2);margin-top:2px}

/* ---------- Grille sections ---------- */
.section{
  background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;margin-bottom:20px;
}
.section-title{font-size:1.05rem;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title .dot{width:8px;height:8px;border-radius:50%;background:var(--or)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:820px){.grid-2{grid-template-columns:1fr}}

/* ---------- Tableaux ---------- */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{
  text-align:left;padding:10px 12px;color:var(--txt-2);font-size:.72rem;
  text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line);font-weight:700;
}
th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
td{padding:9px 12px;border-bottom:1px solid rgba(42,54,68,.5)}
tr:hover td{background:rgba(224,182,74,.04)}
.badge{
  display:inline-block;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:600;
  background:var(--bg-3);border:1px solid var(--line);
}
.progress-cell{color:var(--txt-2);font-weight:600}
.progress-cell.over{color:var(--rouge)}
.progress-cell.under{color:var(--vert)}

/* ---------- Barres de progression catégorie ---------- */
.cat-bar{height:8px;border-radius:6px;background:var(--bg-3);overflow:hidden;margin-top:4px}
.cat-bar > span{display:block;height:100%;border-radius:6px;background:var(--or);transition:width .4s}

/* ---------- Zone import ---------- */
.dropzone{
  border:2px dashed var(--line);border-radius:var(--radius);padding:40px 20px;
  text-align:center;color:var(--txt-2);transition:.2s;cursor:pointer;background:var(--bg-2);
}
.dropzone:hover,.dropzone.drag{border-color:var(--or);color:var(--or);background:rgba(224,182,74,.05)}
.dropzone svg{opacity:.6;margin-bottom:10px}

/* ---------- Formulaires ---------- */
input,select{
  background:var(--bg-3);border:1px solid var(--line);color:var(--txt);
  padding:8px 11px;border-radius:9px;font-size:.85rem;font-family:inherit;width:100%;
}
input:focus,select:focus{outline:none;border-color:var(--or)}
label.field{display:block;margin-bottom:12px}
label.field > span{display:block;font-size:.75rem;color:var(--txt-2);margin-bottom:5px;font-weight:600}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;align-items:end}

/* ---------- Graphiques (canvas + barres CSS) ---------- */
.chart-wrap{position:relative;height:240px;margin-top:8px}
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.legend{display:flex;flex-direction:column;gap:7px;font-size:.82rem}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.legend-val{margin-left:auto;color:var(--txt-2);font-variant-numeric:tabular-nums;padding-left:14px}

/* ---------- Sélecteur mois ---------- */
.month-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.month-btn{
  background:var(--bg-2);border:1px solid var(--line);color:var(--txt-2);
  padding:7px 13px;border-radius:9px;font-size:.82rem;font-weight:600;transition:.15s;
}
.month-btn:hover{color:var(--txt)}
.month-btn.active{background:var(--or);color:var(--or-contrast);border-color:var(--or)}

/* ---------- Toast ---------- */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);
  background:var(--bg-3);border:1px solid var(--or);color:var(--txt);
  padding:13px 22px;border-radius:12px;font-size:.88rem;font-weight:600;z-index:100;
  box-shadow:var(--shadow);transition:transform .3s;max-width:90vw;text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ---------- Divers ---------- */
.muted{color:var(--txt-2)}
.pos{color:var(--vert)}
.neg{color:var(--rouge)}
.right{text-align:right}
.empty{text-align:center;padding:40px;color:var(--txt-2)}
.pill-group{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tag{font-size:.72rem;padding:3px 9px;border-radius:6px;font-weight:600}
.flex-between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.hint{font-size:.78rem;color:var(--txt-2);margin-top:8px;line-height:1.5}
.mini-actions{display:flex;gap:5px}
.icon-btn{background:none;border:none;color:var(--txt-2);padding:4px;border-radius:6px;font-size:.9rem}
.icon-btn:hover{color:var(--or);background:var(--bg-3)}
select.cat-select{padding:4px 8px;font-size:.78rem;min-width:150px}
.scroll-x{overflow-x:auto}
table.wide{min-width:640px}
</style>
</head>
<body>
<!-- Le corps (header, nav, vues) est injecté puis piloté par JS ci-dessous -->

<header>
  <div class="header-row">
    <div>
      <div class="logo">mon<span class="accent">.budget</span></div>
      <div class="header-sub">Suivi mensuel &amp; annuel — 100% privé, données locales</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-sm" id="btnTheme" title="Basculer clair / sombre">🌙 Sombre</button>
      <input type="text" id="deviseInput" value="€" style="width:52px;text-align:center" title="Devise appliquée à toute l'app">
      <button class="btn btn-sm" id="btnExport">⬇ Exporter JSON</button>
      <button class="btn btn-sm" id="btnImportJson">⬆ Importer JSON</button>
      <button class="btn btn-sm btn-danger" id="btnReset">Réinitialiser</button>
    </div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button class="tab active" data-view="annuel">📊 Récapitulatif annuel</button>
  <button class="tab" data-view="mensuel">📅 Vue mensuelle</button>
  <button class="tab" data-view="transactions">💳 Transactions</button>
  <button class="tab" data-view="import">📥 Importer relevés</button>
  <button class="tab" data-view="categories">🏷️ Catégories &amp; règles</button>
  <button class="tab" data-view="budget">🎯 Budget prévu</button>
</nav>

<main id="app"><!-- Vues injectées par JS --></main>

<div id="toast"></div>

<!-- SheetJS : lecture des fichiers .xlsx / .xls (import bancaire) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- pdf.js : lecture des extraits de compte au format PDF, entièrement en local -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; }
</script>
<script>
"use strict";
/* ============================================================
   1) MODÈLE DE DONNÉES & PERSISTANCE
   ============================================================ */
const STORAGE_KEY = "mon_budget_v1";
const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

/* Catégories par défaut : type détermine la couleur/regroupement.
   type ∈ revenu | depense | frais | credit | epargne  */
const CATS_DEFAUT = [
  {nom:"Salaires",           type:"revenu",  couleur:"#4ea87a"},
  {nom:"Autres revenus",     type:"revenu",  couleur:"#63b98c"},
  {nom:"Alimentaire",        type:"depense", couleur:"#d96b6b"},
  {nom:"Sorties & Restaurants",type:"depense",couleur:"#e08a5b"},
  {nom:"Voiture & Carburant",type:"depense", couleur:"#c95d5d"},
  {nom:"Taxes & Impôts",     type:"depense", couleur:"#b04a4a"},
  {nom:"Vêtements",          type:"depense", couleur:"#e0a15b"},
  {nom:"Santé",              type:"depense", couleur:"#d67b9a"},
  {nom:"Titres-services",    type:"depense", couleur:"#7ab0a0"},
  {nom:"Loisirs",            type:"depense", couleur:"#c98acb"},
  {nom:"Loyer / Crédit logement",type:"frais",couleur:"#e0b64a"},
  {nom:"Électricité",        type:"frais",   couleur:"#e0c14a"},
  {nom:"Gaz",                type:"frais",   couleur:"#d4a63e"},
  {nom:"Eau",                type:"frais",   couleur:"#5b8fc7"},
  {nom:"Téléphonie",         type:"frais",   couleur:"#c9a03e"},
  {nom:"Internet",           type:"frais",   couleur:"#b8923a"},
  {nom:"Assurances",         type:"frais",   couleur:"#a8843a"},
  {nom:"Crédit auto",        type:"credit",  couleur:"#9878c4"},
  {nom:"Crédit conso",       type:"credit",  couleur:"#8a6bb5"},
  {nom:"Épargne",            type:"epargne", couleur:"#5b8fc7"},
  {nom:"Investissements",    type:"epargne", couleur:"#4d7fb8"},
  {nom:"Non classé",         type:"depense", couleur:"#6b7684"},
];

/* Règles de catégorisation automatique : si le libellé contient le mot-clé
   (insensible à la casse/accents), on assigne la catégorie. Éditable dans l'onglet. */
const REGLES_DEFAUT = [
  {motcle:"engie",         categorie:"Gaz"},
  {motcle:"luminus",       categorie:"Électricité"},
  {motcle:"electrabel",    categorie:"Électricité"},
  {motcle:"vivaqua",       categorie:"Eau"},
  {motcle:"proximus",      categorie:"Téléphonie"},
  {motcle:"orange",        categorie:"Téléphonie"},
  {motcle:"base",          categorie:"Téléphonie"},
  {motcle:"telenet",       categorie:"Internet"},
  {motcle:"voo",           categorie:"Internet"},
  {motcle:"scarlet",       categorie:"Internet"},
  {motcle:"delhaize",      categorie:"Alimentaire"},
  {motcle:"colruyt",       categorie:"Alimentaire"},
  {motcle:"carrefour",     categorie:"Alimentaire"},
  {motcle:"lidl",          categorie:"Alimentaire"},
  {motcle:"aldi",          categorie:"Alimentaire"},
  {motcle:"okay",          categorie:"Alimentaire"},
  {motcle:"total",         categorie:"Voiture & Carburant"},
  {motcle:"esso",          categorie:"Voiture & Carburant"},
  {motcle:"shell",         categorie:"Voiture & Carburant"},
  {motcle:"q8",            categorie:"Voiture & Carburant"},
  {motcle:"dats24",        categorie:"Voiture & Carburant"},
  {motcle:"parking",       categorie:"Voiture & Carburant"},
  {motcle:"ethias",        categorie:"Assurances"},
  {motcle:"ag insurance",  categorie:"Assurances"},
  {motcle:"axa",           categorie:"Assurances"},
  {motcle:"belfius assur", categorie:"Assurances"},
  {motcle:"restaurant",    categorie:"Sorties & Restaurants"},
  {motcle:"brasserie",     categorie:"Sorties & Restaurants"},
  {motcle:"uber eats",     categorie:"Sorties & Restaurants"},
  {motcle:"pharmaci",      categorie:"Santé"},
  {motcle:"mutuali",       categorie:"Santé"},
  {motcle:"sodexo",        categorie:"Titres-services"},
  {motcle:"pluxee",        categorie:"Titres-services"},
  {motcle:"titres-services",categorie:"Titres-services"},
  {motcle:"titres services",categorie:"Titres-services"},
  {motcle:"spf finances",  categorie:"Taxes & Impôts"},
  {motcle:"precompte",     categorie:"Taxes & Impôts"},
  {motcle:"commune",       categorie:"Taxes & Impôts"},
  {motcle:"intermarche",  categorie:"Alimentaire"},
  {motcle:"epargne pension",categorie:"Épargne"},
  {motcle:"epargne-pension",categorie:"Épargne"},
  {motcle:"frais de gestion",categorie:"Assurances"},
  {motcle:"salaire",       categorie:"Salaires"},
  {motcle:"remuneration",  categorie:"Salaires"},
  {motcle:"virement epargne",categorie:"Épargne"},
];

/* État global de l'application (chargé depuis localStorage ou défaut) */
let etat = chargerEtat();

function etatDefaut(){
  return {
    devise:"€",
    theme:"dark",      // "dark" ou "light"
    annee:new Date().getFullYear(),
    categories:JSON.parse(JSON.stringify(CATS_DEFAUT)),
    regles:JSON.parse(JSON.stringify(REGLES_DEFAUT)),
    transactions:[],   // {id,date(YYYY-MM-DD),libelle,montant(+/-),categorie,source}
    budgets:{},        // budgets["Alimentaire"] = 400  (prévu mensuel par catégorie)
  };
}
function chargerEtat(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(!s) return etatDefaut();
    const e = JSON.parse(s);
    // garde-fous : compléter les champs manquants
    return Object.assign(etatDefaut(), e);
  }catch(err){ console.warn("Chargement échoué, état par défaut",err); return etatDefaut(); }
}
function sauver(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(etat)); }
  catch(err){ toast("⚠️ Sauvegarde locale impossible (stockage plein ?)"); }
}

/* ============================================================
   2) UTILITAIRES
   ============================================================ */
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const dev = () => etat.devise || "€";

/* Formatage monétaire type belge : 1 234,56 € */
function fmt(n){
  const v = (Math.round((n+Number.EPSILON)*100)/100);
  return v.toLocaleString("fr-BE",{minimumFractionDigits:2,maximumFractionDigits:2}) + " " + dev();
}
/* Normalisation texte : minuscules + sans accents, pour comparaison de règles */
function norm(s){
  return (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}
function catObj(nom){ return etat.categories.find(c=>c.nom===nom) || {nom:"Non classé",type:"depense",couleur:"#6b7684"}; }
function couleurCat(nom){ return catObj(nom).couleur; }
function typeCat(nom){ return catObj(nom).type; }

/* Transactions de l'année/mois courants */
function txAnnee(){ return etat.transactions.filter(t=>t.date && t.date.slice(0,4)==String(etat.annee)); }
function txMois(m){ // m = index 0..11
  const mm = String(m+1).padStart(2,"0");
  return etat.transactions.filter(t=>t.date && t.date.slice(0,4)==String(etat.annee) && t.date.slice(5,7)==mm);
}

/* Somme signée par type sur un ensemble de transactions.
   Revenus/épargne comptés en valeur absolue positive ; dépenses/frais/crédits en absolu. */
function totauxParType(list){
  const r={revenu:0,depense:0,frais:0,credit:0,epargne:0};
  list.forEach(t=>{ const ty=typeCat(t.categorie); r[ty]=(r[ty]||0)+Math.abs(t.montant); });
  return r;
}
/* Reste à vivre = revenus - (dépenses + frais + crédits + épargne) */
function resteAVivre(tot){ return tot.revenu - tot.depense - tot.frais - tot.credit - tot.epargne; }

/* ============================================================
   3) MOTEUR DE CATÉGORISATION AUTOMATIQUE
   ============================================================ */
function categoriserAuto(libelle){
  const l = norm(libelle);
  for(const r of etat.regles){
    if(r.motcle && l.includes(norm(r.motcle))) return r.categorie;
  }
  return "Non classé";
}

/* ============================================================
   4) IMPORT CSV & XLSX
   ============================================================ */
/* Détecte le séparateur d'une ligne CSV (; , ou tabulation) */
function detecterSep(ligne){
  const c={";":0,",":0,"\t":0};
  for(const ch of ligne){ if(ch in c) c[ch]++; }
  return Object.keys(c).sort((a,b)=>c[b]-c[a])[0] || ";";
}
/* Parse CSV en tableau de tableaux (gère les guillemets simples) */
function parseCSV(texte){
  const lignes = texte.replace(/\r/g,"").split("\n").filter(l=>l.trim().length);
  if(!lignes.length) return [];
  const sep = detecterSep(lignes[0]);
  return lignes.map(l=>{
    const cells=[]; let cur="",dansGuil=false;
    for(let i=0;i<l.length;i++){
      const ch=l[i];
      if(ch==='"'){ dansGuil=!dansGuil; }
      else if(ch===sep && !dansGuil){ cells.push(cur); cur=""; }
      else cur+=ch;
    }
    cells.push(cur);
    return cells.map(c=>c.trim().replace(/^"|"$/g,""));
  });
}
/* Convertit un montant texte (formats FR/BE/EN) en nombre.
   Gère "1.234,56" / "1,234.56" / "-45,00" / "45.00" / "1 234,56" */
function parseMontant(v){
  if(typeof v==="number") return v;
  if(!v) return NaN;
  let s = v.toString().trim().replace(/\s/g,"").replace(/[€$£]/g,"");
  // signe entre parenthèses = négatif (formats comptables)
  const neg = /^\(.*\)$/.test(s) || s.includes("-");
  s = s.replace(/[()]/g,"").replace(/^-/,"");
  const dernierePoint = s.lastIndexOf(".");
  const derniereVirg = s.lastIndexOf(",");
  if(derniereVirg>dernierePoint){ // virgule = décimale (FR/BE)
    s = s.replace(/\./g,"").replace(",",".");
  } else { // point = décimale (EN)
    s = s.replace(/,/g,"");
  }
  const n = parseFloat(s);
  if(isNaN(n)) return NaN;
  return neg ? -n : n;
}
/* Convertit une date texte en YYYY-MM-DD. Gère DD/MM/YYYY, DD.MM.YYYY, YYYY-MM-DD, DD-MM-YY */
function parseDate(v){
  if(!v) return null;
  if(v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
  let s=v.toString().trim();
  // déjà ISO ?
  let m = s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
  // DD/MM/YYYY ou DD.MM.YY
  m = s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{2,4})/);
  if(m){
    let a=m[3]; if(a.length===2) a="20"+a;
    return `${a}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  }
  return null;
}
/* Devine les colonnes date / libellé / montant à partir des en-têtes.
   Retourne des index, ou {debit,credit} si colonnes séparées. */
function devinerColonnes(entetes){
  const H = entetes.map(norm);
  const trouve = (mots)=>H.findIndex(h=>mots.some(m=>h.includes(m)));
  const idxDate   = trouve(["date","datum"]);
  const idxLib    = trouve(["libelle","communication","description","detail","name","tegenpartij","contrepartie","omschrijving","narrative"]);
  const idxMontant= trouve(["montant","amount","bedrag"]);
  const idxDebit  = trouve(["debit","débit"]);
  const idxCredit = trouve(["credit","crédit"]);
  return {idxDate,idxLib,idxMontant,idxDebit,idxCredit};
}
/* Transforme des lignes (tableau de tableaux, 1ère = en-têtes) en transactions */
function lignesVersTransactions(rows, source){
  if(rows.length<2) return {ok:[],erreurs:["Fichier vide ou sans données."]};
  const entetes = rows[0];
  const col = devinerColonnes(entetes);
  const ok=[], erreurs=[];
  if(col.idxDate<0){ erreurs.push("Colonne date introuvable."); }
  if(col.idxMontant<0 && (col.idxDebit<0 && col.idxCredit<0)){ erreurs.push("Colonne montant (ou débit/crédit) introuvable."); }
  if(erreurs.length) return {ok,erreurs};

  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r || !r.join("").trim()) continue;
    const date = parseDate(r[col.idxDate]);
    if(!date) continue;
    let montant;
    if(col.idxMontant>=0){
      montant = parseMontant(r[col.idxMontant]);
    } else {
      const d = col.idxDebit>=0 ? parseMontant(r[col.idxDebit]) : NaN;
      const c = col.idxCredit>=0 ? parseMontant(r[col.idxCredit]) : NaN;
      montant = (!isNaN(c)&&c!==0) ? Math.abs(c) : (!isNaN(d)&&d!==0 ? -Math.abs(d) : 0);
    }
    if(isNaN(montant)) continue;
    const libelle = col.idxLib>=0 ? (r[col.idxLib]||"") : (r.find((c,ix)=>ix!==col.idxDate&&ix!==col.idxMontant)||"Transaction");
    ok.push({
      id:uid(), date, libelle:libelle.slice(0,120),
      montant, categorie:categoriserAuto(libelle), source:source||"import"
    });
  }
  return {ok,erreurs};
}
/* ---------- Lecture des extraits PDF ----------
   Un PDF n'a pas de colonnes : pdf.js renvoie des fragments de texte avec
   leurs coordonnées. On regroupe les fragments par ligne (même Y), puis on
   détecte, sur chaque ligne, une date + un montant + le libellé au milieu. */

/* Regex : date FR/BE (12/07/2026, 12.07.26, 2026-07-12) */
const RE_DATE = /\b(\d{1,2}[\/.\-]\d{1,2}[\/.\-]\d{2,4}|\d{4}[\/.\-]\d{1,2}[\/.\-]\d{1,2})\b/;
/* Regex : montant avec décimales (obligatoires) — 1.234,56 / 2 925,40 / -45,00 / 88.20-
   Le signe peut précéder ou suivre (certaines banques mettent le "-" après). */
const RE_MONTANT = /[-+]?\d{1,3}(?:[.\s]\d{3})*[.,]\d{2}-?|\d+[.,]\d{2}-?/g;

/* Extrait le texte d'un PDF. Retourne {lignes:[...toutes], pages:[[...page1],[...page2]]} */
async function pdfEnLignes(arrayBuffer){
  if(!window.pdfjsLib) throw new Error("Bibliothèque PDF non chargée (vérifiez votre connexion au premier lancement).");
  const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
  const lignes = [];
  const pages = [];
  for(let p=1;p<=pdf.numPages;p++){
    const page = await pdf.getPage(p);
    const contenu = await page.getTextContent();
    const items = contenu.items;
    // Regrouper par position verticale (Y arrondi) pour reconstituer les lignes
    const parY = {};
    items.forEach(it=>{
      if(!it.str || !it.str.trim()) return;
      const y = Math.round(it.transform[5]);      // coordonnée verticale
      const x = it.transform[4];                  // coordonnée horizontale
      (parY[y] = parY[y] || []).push({x, s:it.str});
    });
    // Trier chaque ligne de gauche à droite, puis les lignes de haut en bas
    const lignesPage = [];
    Object.keys(parY)
      .sort((a,b)=>b-a)  // Y décroissant = haut vers bas
      .forEach(y=>{
        const txt = parY[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(" ").replace(/\s+/g," ").trim();
        if(txt){ lignes.push(txt); lignesPage.push(txt); }
      });
    pages.push(lignesPage);
  }
  return {lignes, pages};
}

/* Convertit un montant "texte PDF" (avec éventuel signe suffixe) en nombre signé. */
function montantPdf(str){
  let s = str.trim();
  const negSuffixe = /-$/.test(s);          // "88,20-" = négatif
  s = s.replace(/-$/,"");
  let n = parseMontant(s);
  if(isNaN(n)) return NaN;
  return negSuffixe ? -Math.abs(n) : n;
}

/* ---------- Parseur spécifique BELFIUS ----------
   Format : chaque mouvement commence par une ligne
     NNNN  DD-MM-YYYY  (VAL. DD-MM-YYYY)  ±  montant
   suivie de 1 à N lignes de description. Les pages "décompte global",
   "épargne-pension" et "valorisation" ne contiennent pas de mouvements
   numérotés et sont ignorées. */
const RE_BELFIUS_MVT = /^(\d{4})\s+(\d{2}-\d{2}-\d{4})\s+\(VAL\.\s*\d{2}-\d{2}-\d{4}\)\s+([-+])\s*([\d.\s]*\d[,.]\d{2})/;

/* Détecte si le PDF est un extrait Belfius */
function estBelfius(pages){
  const txt = pages.flat().join(" ");
  const aMouvements = pages.flat().some(l=>RE_BELFIUS_MVT.test(l));
  return /belfius/i.test(txt) && aMouvements;
}

/* Parse un extrait Belfius page par page (exclut pages sans mouvements) */
function parserBelfius(pages, source){
  const ok=[], erreurs=[];
  for(const lignesPage of pages){
    // Ignorer les pages "produit" (décompte global, épargne-pension, valorisation)
    const texte = lignesPage.join(" ");
    const aMvt = lignesPage.some(l=>RE_BELFIUS_MVT.test(l));
    if(!aMvt) continue;
    if(/DECOMPTE GLOBAL|EPARGNE-PENSION|VALORISATION AU/i.test(texte) && !aMvt) continue;

    let courant=null;  // mouvement en cours d'accumulation de description
    const pousser=()=>{
      if(!courant) return;
      let lib = courant.desc.join(" ").replace(/\s+/g," ").trim();
      if(!lib) lib = "Opération";
      ok.push({
        id:uid(), date:courant.date, libelle:lib.slice(0,160),
        montant:courant.montant, categorie:categoriserAuto(lib), source:source||"Belfius"
      });
      courant=null;
    };
    for(const ligne of lignesPage){
      const m = ligne.match(RE_BELFIUS_MVT);
      if(m){
        pousser();  // clôturer le mouvement précédent
        const date = parseDate(m[2]);
        let montant = parseMontant(m[4]);
        if(m[3]==="-") montant = -Math.abs(montant);
        courant = {date, montant, desc:[]};
      } else if(courant){
        // ligne de description : on ignore les lignes de solde/pied de page
        if(/^SOLDE AU|^TAUX D'INTERET|^-{5,}|BIC:|^\d{2}-\d{2}-\d{4}\s+\d\/EUR/i.test(ligne)){ pousser(); continue; }
        courant.desc.push(ligne);
      }
    }
    pousser();  // clôturer le dernier mouvement de la page
  }
  if(!ok.length) erreurs.push("Extrait Belfius détecté mais aucun mouvement lisible.");
  return {ok,erreurs};
}

/* Transforme les lignes d'un PDF en transactions.
   Heuristique générique (fallback) : on ne garde que les lignes contenant une date ET un montant. */
function lignesPdfVersTransactions(lignes, source){
  const ok=[], erreurs=[];
  // Mots indiquant une ligne de solde / total / en-tête → à ignorer, pas une opération
  const RE_IGNORER = /\b(solde|saldo|balance|total|report|nouveau solde|ancien solde|solde initial|solde final|solde précédent|à reporter|page\b)/i;
  for(const ligne of lignes){
    if(RE_IGNORER.test(ligne)) continue;         // on saute soldes/totaux/pieds de page
    const mDate = ligne.match(RE_DATE);
    if(!mDate) continue;                          // une opération DOIT porter sa propre date
    const date = parseDate(mDate[1]);
    if(!date) continue;
    const montants = ligne.match(RE_MONTANT);
    if(!montants) continue;
    // On prend le DERNIER montant de la ligne comme mouvement (souvent le solde est ailleurs,
    // mais sur la plupart des extraits le montant de l'opération est le dernier chiffre décimal).
    // Si deux montants et le dernier ressemble à un solde très grand, on garde l'avant-dernier.
    let montantStr = montants[montants.length-1];
    let montant = montantPdf(montantStr);
    if(isNaN(montant) || montant===0) continue;
    // Libellé = ligne nettoyée de la date et des montants
    let libelle = ligne
      .replace(RE_DATE,"")
      .replace(RE_MONTANT,"")
      .replace(/\s+/g," ")
      .replace(/^[\s\-–|]+|[\s\-–|]+$/g,"")
      .trim();
    if(!libelle) libelle = "Opération";
    ok.push({
      id:uid(), date, libelle:libelle.slice(0,120),
      montant, categorie:categoriserAuto(libelle), source:source||"pdf"
    });
  }
  if(!ok.length) erreurs.push("Aucune opération détectée. Le PDF est peut-être scanné (image) ou dans une mise en page inhabituelle — dans ce cas, exportez plutôt un CSV depuis votre banque.");
  return {ok,erreurs};
}

/* Point d'entrée : lit un fichier (CSV, XLSX ou PDF) et renvoie une Promise de transactions */
function lireFichier(file){
  return new Promise((resolve,reject)=>{
    const nom = file.name.toLowerCase();
    const reader = new FileReader();
    if(nom.endsWith(".pdf")){
      reader.onload = async e=>{
        try{
          const {lignes, pages} = await pdfEnLignes(e.target.result);
          // Choix du parseur selon le format détecté
          if(estBelfius(pages)) resolve(parserBelfius(pages, "Belfius"));
          else resolve(lignesPdfVersTransactions(lignes, file.name));
        }catch(err){ reject(err); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    } else if(nom.endsWith(".xlsx")||nom.endsWith(".xls")){
      reader.onload = e=>{
        try{
          const wb = XLSX.read(e.target.result,{type:"array",cellDates:true});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
          resolve(lignesVersTransactions(rows, file.name));
        }catch(err){ reject(err); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    } else { // CSV / TSV / TXT
      reader.onload = e=>{
        try{ resolve(lignesVersTransactions(parseCSV(e.target.result), file.name)); }
        catch(err){ reject(err); }
      };
      reader.onerror = reject;
      reader.readAsText(file,"utf-8");
    }
  });
}
/* Détection de doublons : même date + même montant + même libellé normalisé */
function estDoublon(t){
  return etat.transactions.some(x=>
    x.date===t.date && Math.abs(x.montant-t.montant)<0.005 && norm(x.libelle)===norm(t.libelle));
}

/* ============================================================
   5) GRAPHIQUES (canvas natif, sans librairie)
   ============================================================ */
/* Lit une variable CSS courante (permet aux graphes de suivre le thème) */
function cssVar(nom){
  return getComputedStyle(document.documentElement).getPropertyValue(nom).trim() || "#888";
}
/* Donut : segments = [{label,valeur,couleur}] */
function dessinerDonut(canvas, segments){
  const dpr = window.devicePixelRatio||1;
  const taille = 200;
  canvas.width = taille*dpr; canvas.height = taille*dpr;
  canvas.style.width=taille+"px"; canvas.style.height=taille+"px";
  const ctx = canvas.getContext("2d"); ctx.scale(dpr,dpr);
  const cx=taille/2, cy=taille/2, rExt=90, rInt=58;
  const total = segments.reduce((s,x)=>s+x.valeur,0);
  ctx.clearRect(0,0,taille,taille);
  if(total<=0){
    ctx.fillStyle=cssVar("--bg-3"); ctx.beginPath();
    ctx.arc(cx,cy,rExt,0,Math.PI*2); ctx.arc(cx,cy,rInt,0,Math.PI*2,true); ctx.fill();
    ctx.fillStyle=cssVar("--txt-2"); ctx.font="12px sans-serif"; ctx.textAlign="center";
    ctx.fillText("Aucune donnée",cx,cy); return;
  }
  let ang=-Math.PI/2;
  segments.forEach(s=>{
    const a2=ang+(s.valeur/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,rExt,ang,a2); ctx.closePath();
    ctx.fillStyle=s.couleur; ctx.fill();
    ang=a2;
  });
  // trou central
  ctx.beginPath(); ctx.arc(cx,cy,rInt,0,Math.PI*2); ctx.fillStyle=cssVar("--bg-2"); ctx.fill();
  ctx.fillStyle=cssVar("--txt"); ctx.font="bold 15px sans-serif"; ctx.textAlign="center";
  ctx.fillText(fmt(total).replace(" "+dev(),""),cx,cy-2);
  ctx.fillStyle=cssVar("--txt-2"); ctx.font="10px sans-serif"; ctx.fillText(dev()+" total",cx,cy+14);
}
/* Aire/ligne : séries = [{couleur,valeurs:[...12]}] ; labels = MOIS abrégés */
function dessinerAire(canvas, series, labels){
  const dpr=window.devicePixelRatio||1;
  const W=canvas.clientWidth||520, H=220;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width="100%"; canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const padL=48,padR=12,padT=14,padB=26;
  const gw=W-padL-padR, gh=H-padT-padB;
  let max=0; series.forEach(s=>s.valeurs.forEach(v=>{ if(v>max)max=v; }));
  if(max<=0)max=1;
  // grille horizontale
  ctx.strokeStyle=cssVar("--line"); ctx.fillStyle=cssVar("--txt-2"); ctx.font="9px sans-serif"; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=padT+gh-(gh*i/4);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    ctx.textAlign="right"; ctx.fillText(Math.round(max*i/4).toLocaleString("fr-BE"),padL-6,y+3);
  }
  const n=labels.length;
  const px=i=> padL + (n<=1?gw/2:gw*i/(n-1));
  const py=v=> padT + gh - (gh*v/max);
  series.forEach(s=>{
    // aire
    ctx.beginPath(); ctx.moveTo(px(0),py(s.valeurs[0]||0));
    s.valeurs.forEach((v,i)=>ctx.lineTo(px(i),py(v||0)));
    ctx.lineTo(px(n-1),padT+gh); ctx.lineTo(px(0),padT+gh); ctx.closePath();
    const grad=ctx.createLinearGradient(0,padT,0,padT+gh);
    grad.addColorStop(0,s.couleur+"55"); grad.addColorStop(1,s.couleur+"08");
    ctx.fillStyle=grad; ctx.fill();
    // ligne
    ctx.beginPath(); ctx.moveTo(px(0),py(s.valeurs[0]||0));
    s.valeurs.forEach((v,i)=>ctx.lineTo(px(i),py(v||0)));
    ctx.strokeStyle=s.couleur; ctx.lineWidth=2; ctx.stroke();
  });
  // labels mois
  ctx.fillStyle=cssVar("--txt-2"); ctx.font="9px sans-serif"; ctx.textAlign="center";
  labels.forEach((l,i)=>ctx.fillText(l,px(i),H-8));
}

  const reste=resteAVivre(tot);
  const boutonsMois=MOIS.map((m,i)=>`<button class="month-btn ${i===moisCourant?'active':''}" data-mois="${i}">${m.slice(0,3)}</button>`).join("");
  // résumé par catégorie avec budget prévu
  const parCat={};
  tx.forEach(t=>{ parCat[t.categorie]=(parCat[t.categorie]||0)+Math.abs(t.montant); });
  const lignes=Object.entries(parCat).sort((a,b)=>b[1]-a[1]).map(([c,reel])=>{
    const prevu=etat.budgets[c]||0;
    const prog= prevu>0 ? (reel/prevu*100) : null;
    const cls = prog===null?'':(prog>100?'over':'under');
    return `<tr>
      <td><span class="legend-dot" style="display:inline-block;background:${couleurCat(c)};margin-right:8px"></span>${c}<span class="badge" style="margin-left:8px">${typeCat(c)}</span></td>
      <td class="num muted">${prevu?fmt(prevu):'—'}</td>
      <td class="num">${fmt(reel)}</td>
      <td class="num progress-cell ${cls}">${prog!==null?prog.toFixed(0)+' %':'—'}</td>
    </tr>`;
  }).join("");

  return `
  <div class="flex-between" style="margin-bottom:14px">
    <h1 style="font-size:1.5rem">${MOIS[moisCourant]} ${etat.annee}</h1>
    <span class="muted">${tx.length} transaction(s)</span>
  </div>
  <div class="month-selector">${boutonsMois}</div>

  <div class="kpi-grid">
    <div class="kpi revenus"><div class="kpi-label">Revenus</div><div class="kpi-value pos">${fmt(tot.revenu)}</div></div>
    <div class="kpi depenses"><div class="kpi-label">Dépenses</div><div class="kpi-value">${fmt(tot.depense)}</div></div>
    <div class="kpi frais"><div class="kpi-label">Frais fixes</div><div class="kpi-value">${fmt(tot.frais)}</div></div>
    <div class="kpi reste"><div class="kpi-label">Reste à vivre</div><div class="kpi-value ${reste>=0?'pos':'neg'}">${fmt(reste)}</div></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="dot"></span>Résumé par catégorie — prévu vs réel</div>
    ${lignes? `<div class="scroll-x"><table class="wide"><thead><tr><th>Catégorie</th><th class="num">Prévu</th><th class="num">Réel</th><th class="num">Progression</th></tr></thead><tbody>${lignes}</tbody></table></div>`
    : '<div class="empty">Aucune transaction ce mois-ci.</div>'}
  </div>`;
}

/* ---------- Vue : Transactions ---------- */
function vueTransactions(){
  const opts = etat.categories.map(c=>`<option value="${c.nom}">${c.nom}</option>`).join("");
  const tx=[...etat.transactions].sort((a,b)=> (b.date||"").localeCompare(a.date||""));
  const lignes = tx.map(t=>{
    const ty=typeCat(t.categorie);
    const signe = (ty==="revenu") ? '+' : '−';
    const cls = (ty==="revenu")?'pos':'neg';
    return `<tr data-id="${t.id}">
      <td style="white-space:nowrap">${t.date||''}</td>
      <td>${t.libelle||''}</td>
      <td><select class="cat-select" data-id="${t.id}">${etat.categories.map(c=>`<option value="${c.nom}" ${c.nom===t.categorie?'selected':''}>${c.nom}</option>`).join("")}</select></td>
      <td class="num ${cls}" style="white-space:nowrap">${signe} ${fmt(Math.abs(t.montant)).replace(' '+dev(),'')} ${dev()}</td>
      <td class="muted" style="font-size:.72rem">${t.source||''}</td>
      <td><button class="icon-btn btn-suppr" data-id="${t.id}" title="Supprimer">🗑</button></td>
    </tr>`;
  }).join("");

  return `
  <h1 style="font-size:1.5rem;margin-bottom:14px">Transactions</h1>

  <div class="section">
    <div class="section-title"><span class="dot"></span>Ajouter une transaction</div>
    <div class="form-row">
      <label class="field"><span>Date</span><input type="date" id="txDate" value="${new Date().toISOString().slice(0,10)}"></label>
      <label class="field" style="grid-column:span 2"><span>Libellé</span><input type="text" id="txLib" placeholder="Ex. Delhaize Schaerbeek"></label>
      <label class="field"><span>Montant (négatif = dépense)</span><input type="text" id="txMontant" placeholder="-45,00"></label>
      <label class="field"><span>Catégorie</span><select id="txCat">${opts}</select></label>
      <label class="field"><span>&nbsp;</span><button class="btn btn-primary" id="btnAddTx" style="width:100%">+ Ajouter</button></label>
    </div>
  </div>

  <div class="section">
    <div class="flex-between" style="margin-bottom:12px">
      <div class="section-title" style="margin:0"><span class="dot"></span>Liste (${tx.length})</div>
      <button class="btn btn-sm btn-danger" id="btnViderTx">Tout supprimer</button>
    </div>
    ${tx.length? `<div class="scroll-x"><table class="wide"><thead><tr><th>Date</th><th>Libellé</th><th>Catégorie</th><th class="num">Montant</th><th>Source</th><th></th></tr></thead><tbody>${lignes}</tbody></table></div>`
    : '<div class="empty">Aucune transaction. Importez un relevé ou ajoutez-en une.</div>'}
  </div>`;
}

/* ---------- Vue : Import ---------- */
function vueImport(){
  return `
  <h1 style="font-size:1.5rem;margin-bottom:14px">Importer vos relevés</h1>
  <div class="section">
    <div class="dropzone" id="dropzone">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 15V3m0 0l-4 4m4-4l4 4"/><path d="M2 17v3a2 2 0 002 2h16a2 2 0 002-2v-3"/></svg>
      <div style="font-weight:600;font-size:1rem;color:var(--txt)">Glissez vos fichiers ici</div>
      <div class="muted" style="margin-top:6px">ou cliquez pour parcourir — CSV, XLSX, XLS, PDF (extraits bancaires, Visa/Mastercard)</div>
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.txt,.tsv,.pdf" multiple style="display:none">
    </div>
    <div class="hint">
      🔎 Les colonnes <b>date</b>, <b>libellé/communication</b> et <b>montant</b> (ou débit/crédit) sont détectées automatiquement.
      Formats de date DD/MM/YYYY, DD.MM.YY et YYYY-MM-DD reconnus. Les doublons (même date + montant + libellé) sont ignorés.
      La catégorisation automatique s'applique selon vos règles mots-clés.
      <br><br>📄 <b>PDF</b> : les extraits « texte » (générés par la banque) sont lus directement. Les PDF <i>scannés</i> (photos/images) ne contiennent pas de texte et ne peuvent pas être analysés — préférez alors l'export CSV. Vérifiez toujours l'aperçu, la mise en page PDF variant d'une banque à l'autre.
    </div>
  </div>
  <div class="section" id="apercuImport" style="display:none">
    <div class="section-title"><span class="dot"></span>Aperçu de l'import</div>
    <div id="apercuContenu"></div>
  </div>`;
}

/* ---------- Vue : Catégories & règles ---------- */
function vueCategories(){
  const cats = etat.categories.map((c,i)=>`<tr>
    <td><span class="legend-dot" style="display:inline-block;background:${c.couleur};margin-right:8px"></span>${c.nom}</td>
    <td><span class="badge">${c.type}</span></td>
    <td><input type="color" value="${c.couleur}" data-cat="${i}" class="col-cat" style="width:44px;height:28px;padding:2px;border-radius:6px"></td>
    <td><button class="icon-btn btn-suppr-cat" data-i="${i}" title="Supprimer">🗑</button></td>
  </tr>`).join("");
  const regles = etat.regles.map((r,i)=>`<tr>
    <td><input type="text" value="${r.motcle}" data-regle="${i}" data-champ="motcle" class="reg-input"></td>
    <td><select data-regle="${i}" data-champ="categorie" class="reg-input">${etat.categories.map(c=>`<option value="${c.nom}" ${c.nom===r.categorie?'selected':''}>${c.nom}</option>`).join("")}</select></td>
    <td><button class="icon-btn btn-suppr-regle" data-i="${i}" title="Supprimer">🗑</button></td>
  </tr>`).join("");

  return `
  <h1 style="font-size:1.5rem;margin-bottom:14px">Catégories &amp; règles</h1>
  <div class="grid-2">
    <div class="section">
      <div class="section-title"><span class="dot"></span>Catégories</div>
      <div class="form-row" style="margin-bottom:14px">
        <label class="field"><span>Nom</span><input type="text" id="catNom" placeholder="Nouvelle catégorie"></label>
        <label class="field"><span>Type</span><select id="catType"><option value="depense">dépense</option><option value="frais">frais fixe</option><option value="revenu">revenu</option><option value="credit">crédit</option><option value="epargne">épargne</option></select></label>
        <label class="field"><span>&nbsp;</span><button class="btn btn-primary" id="btnAddCat" style="width:100%">+ Ajouter</button></label>
      </div>
      <div class="scroll-x"><table><thead><tr><th>Catégorie</th><th>Type</th><th>Couleur</th><th></th></tr></thead><tbody>${cats}</tbody></table></div>
    </div>
    <div class="section">
      <div class="section-title"><span class="dot"></span>Règles de catégorisation auto</div>
      <div class="form-row" style="margin-bottom:14px">
        <label class="field" style="grid-column:span 2"><span>Mot-clé (dans le libellé)</span><input type="text" id="regMot" placeholder="ex. delhaize"></label>
        <label class="field"><span>Catégorie</span><select id="regCat">${etat.categories.map(c=>`<option value="${c.nom}">${c.nom}</option>`).join("")}</select></label>
        <label class="field"><span>&nbsp;</span><button class="btn btn-primary" id="btnAddRegle" style="width:100%">+ Ajouter</button></label>
      </div>
      <div class="scroll-x"><table><thead><tr><th>Si le libellé contient…</th><th>→ Catégorie</th><th></th></tr></thead><tbody>${regles}</tbody></table></div>
      <button class="btn btn-sm" id="btnRecategoriser" style="margin-top:14px">🔄 Re-catégoriser toutes les transactions</button>
    </div>
  </div>`;
}

/* ---------- Vue : Budget prévu ---------- */
function vueBudget(){
  const lignes = etat.categories.filter(c=>c.type!=="revenu").map(c=>`<tr>
    <td><span class="legend-dot" style="display:inline-block;background:${c.couleur};margin-right:8px"></span>${c.nom}</td>
    <td><span class="badge">${c.type}</span></td>
    <td style="width:180px"><input type="text" value="${etat.budgets[c.nom]||''}" data-budget="${c.nom}" class="budget-input" placeholder="0,00" style="text-align:right"></td>
  </tr>`).join("");
  const totalBudget = Object.values(etat.budgets).reduce((s,v)=>s+(parseFloat(v)||0),0);
  return `
  <h1 style="font-size:1.5rem;margin-bottom:6px">Budget prévu mensuel</h1>
  <p class="muted" style="margin-bottom:18px">Définissez un montant prévu par catégorie. Il sert de référence dans la vue mensuelle (colonne « Progression »).</p>
  <div class="section">
    <div class="flex-between" style="margin-bottom:12px">
      <div class="section-title" style="margin:0"><span class="dot"></span>Montants prévus</div>
      <span class="badge">Total prévu : ${fmt(totalBudget)}</span>
    </div>
    <div class="scroll-x"><table><thead><tr><th>Catégorie</th><th>Type</th><th class="num">Prévu / mois</th></tr></thead><tbody>${lignes}</tbody></table></div>
  </div>`;
}

/* ============================================================
   7) ÉVÉNEMENTS SPÉCIFIQUES À CHAQUE VUE
   ============================================================ */
function brancherEvenementsVue(){
  // --- Vue annuelle : dessiner les graphes après injection DOM ---
  if(vueCourante==="annuel"){
    const tx=txAnnee(), tot=totauxParType(tx);
    const repart=[
      {label:"Dépenses",couleur:"#d96b6b",valeur:tot.depense},
      {label:"Frais fixes",couleur:"#e0b64a",valeur:tot.frais},
      {label:"Crédits",couleur:"#9878c4",valeur:tot.credit},
      {label:"Épargne",couleur:"#5b8fc7",valeur:tot.epargne},
    ];
    const dn=document.getElementById("donutRepart"); if(dn) dessinerDonut(dn,repart);
    const rev=[],dep=[]; for(let m=0;m<12;m++){const t=totauxParType(txMois(m));rev.push(t.revenu);dep.push(t.depense);}
    const ai=document.getElementById("aireAnnuel");
    if(ai) requestAnimationFrame(()=>dessinerAire(ai,[{couleur:"#4ea87a",valeurs:rev},{couleur:"#d96b6b",valeurs:dep}],MOIS.map(m=>m.slice(0,1))));
    q("#anneeMoins",b=>b.onclick=()=>{etat.annee--;sauver();render();});
    q("#annePlus",b=>b.onclick=()=>{etat.annee++;sauver();render();});
  }
  // --- Vue mensuelle : sélecteur de mois ---
  if(vueCourante==="mensuel"){
    document.querySelectorAll(".month-btn").forEach(b=>b.onclick=()=>{moisCourant=+b.dataset.mois;render();});
  }
  // --- Vue transactions ---
  if(vueCourante==="transactions"){
    q("#btnAddTx",b=>b.onclick=ajouterTransaction);
    q("#btnViderTx",b=>b.onclick=()=>{ if(confirm("Supprimer TOUTES les transactions ?")){etat.transactions=[];sauver();render();toast("Transactions supprimées");}});
    document.querySelectorAll(".cat-select").forEach(s=>s.onchange=()=>{
      const t=etat.transactions.find(x=>x.id===s.dataset.id); if(t){t.categorie=s.value;sauver();}
    });
    document.querySelectorAll(".btn-suppr").forEach(b=>b.onclick=()=>{
      etat.transactions=etat.transactions.filter(x=>x.id!==b.dataset.id);sauver();render();
    });
  }
  // --- Vue import ---
  if(vueCourante==="import"){
    const dz=document.getElementById("dropzone"), fi=document.getElementById("fileInput");
    dz.onclick=()=>fi.click();
    fi.onchange=()=>traiterFichiers(fi.files);
    ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add("drag");}));
    ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove("drag");}));
    dz.addEventListener("drop",e=>traiterFichiers(e.dataTransfer.files));
  }
  // --- Vue catégories ---
  if(vueCourante==="categories"){
    q("#btnAddCat",b=>b.onclick=()=>{
      const nom=val("#catNom").trim(); if(!nom)return toast("Nom requis");
      if(etat.categories.some(c=>c.nom===nom))return toast("Catégorie déjà existante");
      etat.categories.push({nom,type:val("#catType"),couleur:"#"+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,"0")});
      sauver();render();toast("Catégorie ajoutée");
    });
    document.querySelectorAll(".col-cat").forEach(inp=>inp.onchange=()=>{etat.categories[+inp.dataset.cat].couleur=inp.value;sauver();render();});
    document.querySelectorAll(".btn-suppr-cat").forEach(b=>b.onclick=()=>{
      const i=+b.dataset.i; if(confirm(`Supprimer la catégorie "${etat.categories[i].nom}" ?`)){etat.categories.splice(i,1);sauver();render();}
    });
    q("#btnAddRegle",b=>b.onclick=()=>{
      const mot=val("#regMot").trim(); if(!mot)return toast("Mot-clé requis");
      etat.regles.push({motcle:mot,categorie:val("#regCat")});sauver();render();toast("Règle ajoutée");
    });
    document.querySelectorAll(".reg-input").forEach(inp=>inp.onchange=()=>{
      etat.regles[+inp.dataset.regle][inp.dataset.champ]=inp.value;sauver();
    });
    document.querySelectorAll(".btn-suppr-regle").forEach(b=>b.onclick=()=>{etat.regles.splice(+b.dataset.i,1);sauver();render();});
    q("#btnRecategoriser",b=>b.onclick=()=>{
      let n=0; etat.transactions.forEach(t=>{const c=categoriserAuto(t.libelle); if(c!=="Non classé"&&c!==t.categorie){t.categorie=c;n++;}});
      sauver();render();toast(n+" transaction(s) re-catégorisée(s)");
    });
  }
  // --- Vue budget ---
  if(vueCourante==="budget"){
    document.querySelectorAll(".budget-input").forEach(inp=>inp.onchange=()=>{
      const v=parseMontant(inp.value); etat.budgets[inp.dataset.budget]= isNaN(v)?0:Math.abs(v); sauver();render();
    });
  }
}

/* ---------- Actions transactions ---------- */
function ajouterTransaction(){
  const date=val("#txDate"), lib=val("#txLib").trim(), cat=val("#txCat");
  let montant=parseMontant(val("#txMontant"));
  if(!date||!lib||isNaN(montant))return toast("Date, libellé et montant requis");
  // si catégorie de type dépense/frais/crédit et montant positif → on garde le signe utilisateur tel quel
  etat.transactions.push({id:uid(),date,libelle:lib,montant,categorie:cat,source:"manuel"});
  sauver();render();toast("Transaction ajoutée");
}

/* ---------- Traitement fichiers importés ---------- */
async function traiterFichiers(files){
  if(!files||!files.length)return;
  let ajout=0,doublons=0,erreursGlobales=[];
  const apercu=[];
  for(const f of files){
    try{
      const res=await lireFichier(f);
      if(res.erreurs.length){ erreursGlobales.push(`${f.name} : ${res.erreurs.join(" ")}`); continue; }
      res.ok.forEach(t=>{
        if(estDoublon(t)){doublons++;return;}
        etat.transactions.push(t);ajout++;
        if(apercu.length<8)apercu.push(t);
      });
    }catch(err){ erreursGlobales.push(`${f.name} : lecture impossible (${err.message||err})`); }
  }
  sauver();
  // afficher aperçu
  const zone=document.getElementById("apercuImport"), contenu=document.getElementById("apercuContenu");
  if(zone&&contenu){
    zone.style.display="block";
    contenu.innerHTML=`
      <div class="kpi-grid" style="margin-bottom:14px">
        <div class="kpi revenus"><div class="kpi-label">Ajoutées</div><div class="kpi-value pos">${ajout}</div></div>
        <div class="kpi depenses"><div class="kpi-label">Doublons ignorés</div><div class="kpi-value">${doublons}</div></div>
        <div class="kpi frais"><div class="kpi-label">Fichiers</div><div class="kpi-value">${files.length}</div></div>
      </div>
      ${erreursGlobales.length?`<div class="hint neg">⚠️ ${erreursGlobales.join("<br>")}</div>`:""}
      ${apercu.length?`<div class="scroll-x"><table class="wide"><thead><tr><th>Date</th><th>Libellé</th><th>Catégorie auto</th><th class="num">Montant</th></tr></thead><tbody>
        ${apercu.map(t=>`<tr><td>${t.date}</td><td>${t.libelle}</td><td><span class="badge">${t.categorie}</span></td><td class="num ${t.montant>=0?'pos':'neg'}">${fmt(t.montant)}</td></tr>`).join("")}
      </tbody></table></div><p class="hint">Ajustez les catégories dans l'onglet « Transactions ».</p>`:""}
    `;
  }
  toast(`${ajout} transaction(s) importée(s), ${doublons} doublon(s) ignoré(s)`);
}

/* ============================================================
   8) ÉVÉNEMENTS GLOBAUX (header, onglets)
   ============================================================ */
function q(sel,cb){ const el=document.querySelector(sel); if(el&&cb)cb(el); return el; }
function val(sel){ const el=document.querySelector(sel); return el?el.value:""; }
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2600);
}
/* Navigation onglets */
document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest(".tab"); if(!b)return;
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); vueCourante=b.dataset.view; render();
});
/* Devise */
document.getElementById("deviseInput").addEventListener("change",e=>{
  etat.devise=e.target.value.trim()||"€"; sauver(); render();
});
/* Export JSON */
document.getElementById("btnExport").onclick=()=>{
  const blob=new Blob([JSON.stringify(etat,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`mon-budget-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href); toast("Sauvegarde JSON exportée");
};
/* Import JSON */
document.getElementById("btnImportJson").onclick=()=>{
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json";
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{ try{
      const data=JSON.parse(r.result);
      etat=Object.assign(etatDefaut(),data); sauver(); appliquerTheme(); render(); toast("Sauvegarde JSON importée");
    }catch(err){toast("Fichier JSON invalide");}};
    r.readAsText(f);
  };
  inp.click();
};
/* Réinitialiser */
document.getElementById("btnReset").onclick=()=>{
  if(confirm("Tout réinitialiser ? (catégories, règles, transactions, budgets)")){
    etat=etatDefaut(); sauver(); appliquerTheme(); render(); toast("Application réinitialisée");
  }
};
/* Redessin des graphes au redimensionnement */
window.addEventListener("resize",()=>{ if(vueCourante==="annuel")brancherEvenementsVue(); });

/* ---------- Thème clair / sombre ---------- */
function appliquerTheme(){
  const clair = etat.theme === "light";
  document.documentElement.setAttribute("data-theme", clair ? "light" : "dark");
  const b = document.getElementById("btnTheme");
  if(b) b.textContent = clair ? "☀️ Clair" : "🌙 Sombre";
}
document.getElementById("btnTheme").onclick=()=>{
  etat.theme = (etat.theme === "light") ? "dark" : "light";
  sauver(); appliquerTheme(); render();   // render() redessine les graphes aux bonnes couleurs
  toast(etat.theme === "light" ? "Thème clair activé" : "Thème sombre activé");
};

/* ---------- Démarrage ---------- */
appliquerTheme();
render();
</script>

</html>
